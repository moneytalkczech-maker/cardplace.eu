<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009DFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A7FF00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7CFF00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0044;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- CP Logo -->
  <g transform="translate(5, 5)">
    <!-- C letter (blue) -->
    <path d="M35 15 C22 15, 12 25, 12 38 C12 51, 22 61, 35 61 L35 52 C26 52, 22 47, 22 38 C22 29, 26 24, 35 24 Z" 
          fill="none" stroke="url(#blueGrad)" stroke-width="3.5" filter="url(#glow)"/>
    
    <!-- Lightning bolt (red) -->
    <path d="M42 10 L30 35 L38 35 L34 60 L54 30 L44 30 Z" 
          fill="url(#redGrad)" filter="url(#glowStrong)"/>
    
    <!-- P letter (green) -->
    <path d="M58 15 L75 15 C84 15, 88 20, 88 28 C88 36, 84 41, 75 41 L67 41 L67 60 L58 60 Z M67 24 L67 32 L75 32 C80 32, 80 24, 75 24 Z" 
          fill="none" stroke="url(#greenGrad)" stroke-width="3.5" filter="url(#glow)"/>
  </g>
  
  <!-- Brand Name -->
  <text x="105" y="42" font-family="Rajdhani, sans-serif" font-weight="700" font-size="32" fill="url(#whiteGrad)">CARD</text>
  <text x="175" y="42" font-family="Rajdhani, sans-serif" font-weight="700" font-size="32" fill="url(#greenGrad)">PLACE</text>
  <text x="255" y="42" font-family="Rajdhani, sans-serif" font-weight="700" font-size="32" fill="url(#redGrad)">.eu</text>
  
  <!-- Tagline -->
  <text x="105" y="62" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#9CA3AF" letter-spacing="2">from passion to collection</text>
  
  <!-- Decorative lines -->
  <line x1="105" y1="50" x2="140" y2="50" stroke="url(#blueGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="50" x2="315" y2="50" stroke="url(#redGrad)" stroke-width="1" opacity="0.5"/>
</svg>
