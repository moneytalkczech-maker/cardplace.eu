<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050A12"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C8FF"/>
      <stop offset="100%" style="stop-color:#009DFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="300" fill="#00C8FF" opacity="0.03"/>
  <circle cx="1100" cy="100" r="250" fill="#A7FF00" opacity="0.03"/>
  <!-- Card icon -->
  <g transform="translate(200, 150) scale(1.5)">
    <rect x="0" y="0" width="160" height="220" rx="12" fill="none" stroke="#00C8FF" stroke-width="2" opacity="0.3"/>
    <rect x="15" y="15" width="130" height="90" rx="8" fill="none" stroke="#00C8FF" stroke-width="1.5" opacity="0.2"/>
    <circle cx="80" cy="60" r="25" fill="none" stroke="#A7FF00" stroke-width="1.5" opacity="0.4"/>
    <rect x="15" y="120" width="130" height="8" rx="4" fill="#00C8FF" opacity="0.15"/>
    <rect x="15" y="138" width="90" height="8" rx="4" fill="#00C8FF" opacity="0.1"/>
  </g>
  <!-- Text -->
  <text x="430" y="230" font-family="system-ui, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF">CardBid</text>
  <text x="430" y="290" font-family="system-ui, sans-serif" font-size="24" fill="#888888">AI tržiště se sběratelskými kartami</text>
  <!-- Badge -->
  <rect x="430" y="320" width="160" height="36" rx="18" fill="none" stroke="#00C8FF" stroke-width="1" opacity="0.3"/>
  <text x="510" y="345" font-family="system-ui, sans-serif" font-size="14" fill="#00C8FF" text-anchor="middle">Aukce · Sken · AI</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#00C8FF" opacity="0.05"/>
  <text x="600" y="612" font-family="system-ui, sans-serif" font-size="14" fill="#666666" text-anchor="middle">cardbid.app</text>
</svg>
