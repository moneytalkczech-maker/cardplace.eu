<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050A12"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C8FF"/>
      <stop offset="100%" style="stop-color:#009DFF"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A7FF00"/>
      <stop offset="100%" style="stop-color:#7CFF00"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3366"/>
      <stop offset="100%" style="stop-color:#FF0044"/>
    </linearGradient>
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C8FF"/>
      <stop offset="50%" style="stop-color:#FF0044"/>
      <stop offset="100%" style="stop-color:#7CFF00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#00C8FF" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#00C8FF" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="#00C8FF" stroke-width="1"/>
  </g>
  
  <!-- Decorative orbs -->
  <circle cx="150" cy="500" r="250" fill="#00C8FF" opacity="0.04"/>
  <circle cx="1050" cy="130" r="200" fill="#A7FF00" opacity="0.04"/>
  <circle cx="600" cy="315" r="300" fill="#FF0044" opacity="0.02"/>
  
  <!-- CP Logo -->
  <g transform="translate(100, 120)">
    <!-- C letter (blue) -->
    <path d="M60 30 C30 30, 15 50, 15 75 C15 100, 30 120, 60 120 L60 100 C40 100, 30 90, 30 75 C30 60, 40 50, 60 50 Z" 
          fill="none" stroke="url(#blueGrad)" stroke-width="6" filter="url(#glow)"/>
    
    <!-- Lightning bolt (red) -->
    <path d="M80 15 L55 70 L70 70 L62 125 L100 60 L85 60 Z" 
          fill="url(#redGrad)" filter="url(#glow)"/>
    
    <!-- P letter (green) -->
    <path d="M110 30 L150 30 C170 30, 180 40, 180 60 C180 80, 170 90, 150 90 L130 90 L130 125 L110 125 Z M130 50 L130 70 L150 70 C160 70, 160 50, 150 50 Z" 
          fill="none" stroke="url(#greenGrad)" stroke-width="6" filter="url(#glow)"/>
  </g>
  
  <!-- Brand Name -->
  <text x="320" y="210" font-family="Rajdhani, system-ui, sans-serif" font-weight="700" font-size="80" fill="#FFFFFF">CARD</text>
  <text x="520" y="210" font-family="Rajdhani, system-ui, sans-serif" font-weight="700" font-size="80" fill="url(#greenGrad)">PLACE</text>
  <text x="760" y="210" font-family="Rajdhani, system-ui, sans-serif" font-weight="700" font-size="80" fill="url(#redGrad)">.eu</text>
  
  <!-- Tagline -->
  <text x="320" y="260" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="24" fill="#9CA3AF" letter-spacing="4">from passion to collection</text>
  
  <!-- Decorative lines -->
  <line x1="320" y1="280" x2="420" y2="280" stroke="url(#blueGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="820" y1="280" x2="920" y2="280" stroke="url(#redGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Features -->
  <g transform="translate(320, 340)">
    <!-- Auction -->
    <g>
      <rect x="0" y="0" width="200" height="80" rx="12" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.3"/>
      <text x="100" y="35" font-family="Rajdhani, system-ui, sans-serif" font-weight="600" font-size="20" fill="#00C8FF" text-anchor="middle">AUKCE</text>
      <text x="100" y="55" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#6B7280" text-anchor="middle">FAIR &amp; SAFE</text>
    </g>
    
    <!-- Cards -->
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="200" height="80" rx="12" fill="none" stroke="url(#greenGrad)" stroke-width="1" opacity="0.3"/>
      <text x="100" y="35" font-family="Rajdhani, system-ui, sans-serif" font-weight="600" font-size="20" fill="#A7FF00" text-anchor="middle">SBRATELSKÉ KARTY</text>
      <text x="100" y="55" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#6B7280" text-anchor="middle">TVÁ VÁŠEŇ</text>
    </g>
    
    <!-- Investment -->
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="200" height="80" rx="12" fill="none" stroke="url(#redGrad)" stroke-width="1" opacity="0.3"/>
      <text x="100" y="35" font-family="Rajdhani, system-ui, sans-serif" font-weight="600" font-size="20" fill="#FF3366" text-anchor="middle">INVESTICE</text>
      <text x="100" y="55" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#6B7280" text-anchor="middle">DO BUDOUCNOSTI</text>
    </g>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#lightningGrad)" opacity="0.05"/>
  <text x="600" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#666666" text-anchor="middle">cardplace.eu</text>
</svg>
