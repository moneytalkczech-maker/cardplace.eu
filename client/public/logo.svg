<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009DFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A7FF00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7CFF00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0044;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#050A12" stroke="url(#blueGrad)" stroke-width="2"/>
  
  <!-- C letter (blue) -->
  <path d="M45 30 C30 30, 20 40, 20 55 C20 70, 30 80, 45 80 L45 70 C35 70, 30 65, 30 55 C30 45, 35 40, 45 40 Z" 
        fill="none" stroke="url(#blueGrad)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Lightning bolt (red) -->
  <path d="M55 25 L40 55 L50 55 L45 85 L70 50 L58 50 Z" 
        fill="url(#redGrad)" filter="url(#glow)"/>
  
  <!-- P letter (green) -->
  <path d="M65 30 L85 30 C95 30, 100 35, 100 45 C100 55, 95 60, 85 60 L75 60 L75 80 L65 80 Z M75 40 L75 50 L85 50 C90 50, 90 40, 85 40 Z" 
        fill="none" stroke="url(#greenGrad)" stroke-width="4" filter="url(#glow)"/>
</svg>
