# Render Blueprint — Infrastructure as Code
# https://render.com/docs/blueprint-spec
#
# Infrastruktura:
# - API server (Node.js + Express)
# - Frontend (Next.js 14 App Router — Node.js web service)
# - PostgreSQL databáze
#
# Po prvním deployi nastav v Render Dashboard tyto env proměnné:
#   cardplace-api:
#     STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET
#     RESEND_API_KEY, EMAIL_FROM
#     GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#     SENTRY_DSN (volitelné)
#     ANTHROPIC_API_KEY (pouze pro Next.js frontend — nastavit v cardplace-frontend)
#   cardplace-frontend:
#     ANTHROPIC_API_KEY
#     NEXT_PUBLIC_SOCKET_URL=https://cardplace-api.onrender.com

services:
  # ─── Backend API (Node.js / Express) ───────────────────────
  - type: web
    name: cardplace-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd server && npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://cardplace.eu
      - key: DATABASE_URL
        fromDatabase:
          name: cardplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: EUR_TO_CZK
        value: "25.3"
      - key: USD_TO_CZK
        value: "23.2"
      - key: GBP_TO_CZK
        value: "29.5"

  # ─── Frontend (Next.js 14 App Router) ────────────────────────
  - type: web
    name: cardplace-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd nextjs && npm install && npm run build
    startCommand: cd nextjs && npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXPRESS_URL
        value: http://cardplace-api:10000
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://cardplace-api.onrender.com

databases:
  # ─── PostgreSQL (Render Managed) ──────────────────────────
  - name: cardplace-db
    databaseName: cardplace
    plan: free
    region: frankfurt
